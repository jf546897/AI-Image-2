name: Bug 报告
description: 报告可复现缺陷、异常行为或回归问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供**可复现步骤**与**脱敏后的日志**，不要粘贴 API Key、Cookie、令牌或其他敏感信息。
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 用 1-3 句话描述实际问题。
      placeholder: 例如：点击“生成图片”后一直转圈，日志出现 401。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - 启动 / 停止
        - 本地配置保存
        - 模型列表获取
        - 图片生成
        - 页面交互 / UI
        - 打包 / 便携运行
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序列出最短复现路径。
      placeholder: |
        1. 双击 Start_AI_Image2.bat
        2. 打开 http://127.0.0.1:8012/
        3. 填入 Base URL 与 API Key
        4. 点击 Generate
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本 / 提交信息
      description: 如知道当前分支、提交号、打包日期，请填写。
      placeholder: main@abcdef1 / portable zip 2026-04-26
  - type: dropdown
    id: runtime_source
    attributes:
      label: 运行时来源
      options:
        - 使用仓库自带 runtime
        - 使用本机 Python 环境
        - 不确定
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python 版本（如适用）
      placeholder: 3.10.11
  - type: input
    id: provider
    attributes:
      label: 提供方 / Base URL（脱敏）
      description: 只保留服务名或域名，不要包含密钥。
      placeholder: api.openai.com / your-gateway.example.com
  - type: input
    id: model
    attributes:
      label: 相关模型（如适用）
      placeholder: gpt-image-2
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 报错信息（请先脱敏）
      description: 可贴关键报错、HTTP 状态码、浏览器控制台信息或服务端日志片段。
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可补充截图、网络环境、代理、是否首次启动等。
